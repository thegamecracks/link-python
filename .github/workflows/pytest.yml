# TODO: define test matrix for platform + python version
name: Run pytest

on:
  push:
    paths:
      - 'src/**.cpp'
      - 'src-py/**.py'
      - 'tests/**.py'
  pull_request:
    paths:
      - 'src/**.cpp'
      - 'src-py/**.py'
      - 'tests/**.py'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        fetch-tags: true
        submodules: recursive
    - uses: astral-sh/setup-uv@v8.2.0
    - run: uv sync --locked
    - run: uv run -m pytest
